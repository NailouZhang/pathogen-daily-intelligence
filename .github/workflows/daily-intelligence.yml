name: Daily Pathogen Intelligence

on:
  schedule:
    # Beijing time 06:20 = UTC 22:20 on the previous calendar day.
    - cron: "20 22 * * *"
  workflow_dispatch:
    inputs:
      profile_id:
        description: Profile directory name
        required: true
        default: hantavirus
      demo_mode:
        description: Use deterministic demo records instead of public APIs
        required: true
        type: boolean
        default: false
      disable_llm:
        description: Publish a deterministic no-AI issue
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write
  models: read

concurrency:
  group: daily-pathogen-intelligence
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      issue_date: ${{ steps.issue.outputs.issue_date }}
    steps:
      - name: Checkout main branch for executable code
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Restore durable data and static archive from intelligence-data
        run: |
          rm -rf /tmp/pdi_previous /tmp/pdi_out
          mkdir -p /tmp/pdi_previous /tmp/pdi_out
          if git ls-remote --exit-code --heads origin intelligence-data >/dev/null 2>&1; then
            git fetch origin intelligence-data:refs/remotes/origin/intelligence-data
            git archive origin/intelligence-data data site 2>/dev/null | tar -x -C /tmp/pdi_previous || true
            if [ -d /tmp/pdi_previous/data ]; then
              mkdir -p /tmp/pdi_out/data
              rsync -a /tmp/pdi_previous/data/ /tmp/pdi_out/data/
            fi
            if [ -d /tmp/pdi_previous/site ]; then
              mkdir -p /tmp/pdi_out/site
              rsync -a /tmp/pdi_previous/site/ /tmp/pdi_out/site/
            fi
          fi

      - name: Generate daily issue outside the Git working tree
        env:
          PROFILE_ID: ${{ inputs.profile_id || 'hantavirus' }}
          DEMO_MODE: ${{ inputs.demo_mode || 'false' }}
          DISABLE_LLM: ${{ inputs.disable_llm || 'false' }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          CROSSREF_MAILTO: ${{ secrets.CROSSREF_MAILTO }}
          UNPAYWALL_EMAIL: ${{ secrets.UNPAYWALL_EMAIL }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_AI_STUDIO_API_KEY: ${{ secrets.GOOGLE_AI_STUDIO_API_KEY }}
          GITHUB_MODELS_TOKEN: ${{ github.token }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          GITHUB_MODELS_MODEL: ${{ vars.GITHUB_MODELS_MODEL }}
          GROQ_MODEL: ${{ vars.GROQ_MODEL }}
          PDI_USER_AGENT: ${{ vars.PDI_USER_AGENT }}
        run: |
          ARGS=(--profile "$PROFILE_ID" --output-dir /tmp/pdi_out --state-dir /tmp/pdi_out/data/state)
          if [ "$DEMO_MODE" = "true" ]; then ARGS+=(--demo); fi
          if [ "$DISABLE_LLM" = "true" ]; then ARGS+=(--disable-llm); fi
          python scripts/run_daily.py "${ARGS[@]}"

      - name: Verify non-empty output and expose issue date
        id: issue
        run: |
          test -s /tmp/pdi_out/data/latest.json
          test -s /tmp/pdi_out/site/index.html
          test -s /tmp/pdi_out/site/feed.xml
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          issue = json.loads(Path('/tmp/pdi_out/data/latest.json').read_text(encoding='utf-8'))
          assert issue.get('issue_id')
          print('issue_date=' + issue['issue_date'])
          PY

      - name: Upload complete recovery artifact
        uses: actions/upload-artifact@v7
        with:
          name: daily-intelligence-${{ steps.issue.outputs.issue_date }}-${{ github.run_number }}
          path: /tmp/pdi_out
          if-no-files-found: error
          retention-days: 30

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: /tmp/pdi_out/site

      - name: Send optional HTML email
        continue-on-error: true
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          python scripts/send_email.py \
            --html /tmp/pdi_out/email/latest.html \
            --subject "汉坦病毒每日情报 ${{ steps.issue.outputs.issue_date }}"

      - name: Persist data and static history to intelligence-data branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          DATA_BRANCH_EXISTS=false
          if git ls-remote --exit-code --heads origin intelligence-data >/dev/null 2>&1; then
            DATA_BRANCH_EXISTS=true
            git switch --force-create intelligence-data origin/intelligence-data
          else
            git switch --orphan intelligence-data
            git rm -rf . || true
          fi

          mkdir -p data site
          rsync -a --delete /tmp/pdi_out/data/ data/
          rsync -a --delete /tmp/pdi_out/site/ site/

          # Stage first: a plain unstaged diff does not include brand-new files.
          git add -A data site
          if git diff --cached --quiet -- data site; then
            echo "No durable intelligence changes to commit."
            exit 0
          fi
          echo "Files staged for intelligence-data:"
          git diff --cached --stat -- data site
          git commit -m "chore: publish pathogen intelligence ${{ steps.issue.outputs.issue_date }}"
          if [ "$DATA_BRANCH_EXISTS" = "true" ]; then
            git pull --rebase --autostash origin intelligence-data
          fi
          git push origin HEAD:intelligence-data

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
