name: Daily Pathogen Intelligence

on:
  schedule:
    - cron: "20 22 * * *"
  workflow_dispatch:
    inputs:
      profile_id:
        description: Pathogen profile seed, for example hantavirus
        required: true
        default: hantavirus

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-pathogen-intelligence-${{ inputs.profile_id || vars.PDI_PROFILE_ID || 'hantavirus' }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    outputs:
      issue_date: ${{ steps.issue.outputs.issue_date }}
    steps:
      - name: Checkout executable code
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Restore durable intelligence data
        run: |
          rm -rf /tmp/pdi_previous /tmp/pdi_out
          mkdir -p /tmp/pdi_previous /tmp/pdi_out
          if git ls-remote --exit-code --heads origin intelligence-data >/dev/null 2>&1; then
            git fetch origin intelligence-data:refs/remotes/origin/intelligence-data
            git archive origin/intelligence-data data site 2>/dev/null | tar -x -C /tmp/pdi_previous || true
            if [ -d /tmp/pdi_previous/data ]; then
              mkdir -p /tmp/pdi_out/data
              rsync -a /tmp/pdi_previous/data/ /tmp/pdi_out/data/
            fi
            if [ -d /tmp/pdi_previous/site ]; then
              mkdir -p /tmp/pdi_out/site
              rsync -a /tmp/pdi_previous/site/ /tmp/pdi_out/site/
            fi
          fi

      - name: Collect, analyse and publish seven-day intelligence
        env:
          PROFILE_ID: ${{ inputs.profile_id || vars.PDI_PROFILE_ID || 'hantavirus' }}
          CROSSREF_MAILTO: ${{ secrets.CROSSREF_MAILTO }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          GROQ_MODEL: ${{ vars.GROQ_MODEL }}
          PDI_USER_AGENT: ${{ vars.PDI_USER_AGENT }}
        run: |
          python scripts/run_daily.py \
            --profile "$PROFILE_ID" \
            --output-dir /tmp/pdi_out \
            --state-dir /tmp/pdi_out/data/state

      - name: Verify outputs
        id: issue
        run: |
          test -s /tmp/pdi_out/data/latest.json
          test -s /tmp/pdi_out/site/index.html
          test -s /tmp/pdi_out/site/feed.xml
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          issue = json.loads(Path('/tmp/pdi_out/data/latest.json').read_text(encoding='utf-8'))
          assert issue.get('issue_id')
          assert issue.get('papers') is not None
          assert issue.get('news') is not None
          print('issue_date=' + issue['issue_date'])
          PY

      - name: Upload recovery artifact
        uses: actions/upload-artifact@v7
        with:
          name: pathogen-intelligence-${{ steps.issue.outputs.issue_date }}-${{ github.run_number }}
          path: /tmp/pdi_out
          if-no-files-found: error
          retention-days: 30

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: /tmp/pdi_out/site

      - name: Persist history to intelligence-data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          DATA_BRANCH_EXISTS=false
          if git ls-remote --exit-code --heads origin intelligence-data >/dev/null 2>&1; then
            DATA_BRANCH_EXISTS=true
            git switch --force-create intelligence-data origin/intelligence-data
          else
            git switch --orphan intelligence-data
            git rm -rf . || true
          fi
          mkdir -p data site
          rsync -a --delete /tmp/pdi_out/data/ data/
          rsync -a --delete /tmp/pdi_out/site/ site/
          git add -A data site
          if git diff --cached --quiet -- data site; then
            echo "No intelligence changes to commit."
            exit 0
          fi
          git commit -m "chore: publish pathogen intelligence ${{ steps.issue.outputs.issue_date }}"
          if [ "$DATA_BRANCH_EXISTS" = "true" ]; then
            git pull --rebase --autostash origin intelligence-data
          fi
          git push origin HEAD:intelligence-data

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
