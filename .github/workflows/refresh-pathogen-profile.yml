name: Refresh Pathogen Profile

on:
  schedule:
    # Beijing time 07:35 on the second day of each month = UTC 23:35 on the first day.
    - cron: "35 23 1 * *"
  workflow_dispatch:
    inputs:
      profile_id:
        description: Profile directory name
        required: true
        default: hantavirus

permissions:
  contents: read

concurrency:
  group: pathogen-profile-refresh-${{ github.repository }}
  cancel-in-progress: false

jobs:
  refresh:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule != ''
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements.txt
      - name: Check source health and produce non-destructive diff
        env:
          PROFILE_ID: ${{ inputs.profile_id || 'hantavirus' }}
        run: |
          rm -rf /tmp/pdi-profile-refresh
          python scripts/refresh_profile.py \
            --profile "$PROFILE_ID" \
            --output-dir /tmp/pdi-profile-refresh
      - uses: actions/upload-artifact@v7
        with:
          name: pathogen-profile-refresh-${{ github.run_number }}
          path: /tmp/pdi-profile-refresh
          if-no-files-found: error
