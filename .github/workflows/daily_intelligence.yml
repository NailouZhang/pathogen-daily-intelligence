name: Pathogen Daily Intelligence

on:
  schedule:
    - cron: '0 2 * * *' # 每天北京时间 10:00 AM (02:00 UTC) 自动运行
  workflow_dispatch: # 支持手动触发并输入任意病原体
    inputs:
      profile_id:
        description: '病原体名称/种子词 (例如: hantavirus, ebola, coronavirus)'
        required: true
        default: 'hantavirus'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装基本依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行分析与生成引擎
        env:
          CROSSREF_MAILTO: ${{ secrets.CROSSREF_MAILTO }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PROFILE_ID: ${{ github.event.inputs.profile_id || 'hantavirus' }}
        run: |
          python main.py

      - name: 部署至 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
