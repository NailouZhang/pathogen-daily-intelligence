name: CI
on:
  workflow_dispatch:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements.txt
      - run: python -m pytest
      - run: |
          rm -rf /tmp/pdi_demo
          python scripts/run_daily.py --profile hantavirus --output-dir /tmp/pdi_demo --state-dir /tmp/pdi_demo/data/state --demo
          test -s /tmp/pdi_demo/data/latest.json
          test -s /tmp/pdi_demo/site/index.html
