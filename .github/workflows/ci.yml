name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Compile and validate
        run: |
          python -m compileall -q src scripts app.py pages tests
          python scripts/validate_project.py
      - name: Run tests
        run: pytest
      - name: Deterministic demo smoke test
        run: |
          rm -rf /tmp/pdi-ci-demo
          python scripts/run_daily.py --profile hantavirus --output-dir /tmp/pdi-ci-demo --demo --disable-llm
          test -s /tmp/pdi-ci-demo/data/latest.json
          test -s /tmp/pdi-ci-demo/site/index.html
      - name: No-credential LLM fallback smoke test
        env:
          GITHUB_MODELS_TOKEN: ""
          GITHUB_TOKEN: ""
          GEMINI_API_KEY: ""
          GOOGLE_AI_STUDIO_API_KEY: ""
          GROQ_API_KEY: ""
        run: |
          rm -rf /tmp/pdi-ci-no-model
          python scripts/run_daily.py --profile hantavirus --output-dir /tmp/pdi-ci-no-model --demo
          test -s /tmp/pdi-ci-no-model/data/latest.json
          test -s /tmp/pdi-ci-no-model/site/index.html
          grep -q 'translation_audit' /tmp/pdi-ci-no-model/data/entities/scholarly_works.jsonl
