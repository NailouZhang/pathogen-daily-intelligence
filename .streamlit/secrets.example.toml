# Copy this file to .streamlit/secrets.toml locally, or paste it into
# Streamlit Community Cloud Secrets. Never commit real keys.

PDI_GITHUB_REPO = "YOUR_GITHUB_USERNAME/pathogen-daily-intelligence"
PDI_DATA_BRANCH = "intelligence-data"

# Required only when the GitHub repository is private.
# Use a fine-grained token limited to this repository with Contents: Read.
GITHUB_DATA_TOKEN = ""

# These API keys are used by GitHub Actions, not by normal Streamlit visitors.
NCBI_API_KEY = ""
SEMANTIC_SCHOLAR_API_KEY = ""
CROSSREF_MAILTO = "your-email@example.com"
GEMINI_API_KEY = ""
GOOGLE_AI_STUDIO_API_KEY = ""
GEMINI_MODEL = ""
GITHUB_MODELS_TOKEN = ""
GITHUB_MODELS_MODEL = ""
GROQ_API_KEY = ""
GROQ_MODEL = ""

# Optional SMTP delivery from GitHub Actions.
SMTP_HOST = ""
SMTP_PORT = 587
SMTP_USERNAME = ""
SMTP_PASSWORD = ""
EMAIL_FROM = ""
EMAIL_TO = ""

# Used by the Unpaywall API for lawful open-access location discovery.
UNPAYWALL_EMAIL = "researcher@example.org"
